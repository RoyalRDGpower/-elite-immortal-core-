
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOD Cyber Command Contact</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <style>
    body {
      background-color: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 50px;
    }
    img.logo {
      width: 120px;
      margin-bottom: 20px;
    }
    h1 {
      color: #00aaff;
      font-size: 32px;
    }
    h2 {
      font-weight: 400;
      color: #999;
      margin-bottom: 30px;
    }
    input, textarea {
      width: 320px;
      padding: 12px;
      margin: 10px 0;
      border-radius: 4px;
      border: none;
      background: #1c1c1c;
      color: white;
    }
    button {
      padding: 12px 25px;
      border: none;
      border-radius: 4px;
      background-color: #007acc;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #005f99;
    }
    p.email {
      margin-top: 40px;
      color: #bbb;
      font-style: italic;
    }
  </style>
</head>
<body>

  <img src="dod-logo.png" alt="DOD Logo" class="logo" />
  <h1>Department of Defense</h1>
  <h2>Strategic Cyber Intelligence Division</h2>

  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <input type="text" name="name" placeholder="Your Name" required /><br />
    <input type="email" name="_replyto" placeholder="Your Email" required /><br />
    <textarea name="message" placeholder="Your Message" rows="5" required></textarea><br />
    <button type="submit">Send Message</button>
  </form>

  <p class="email">Official Contact: dept.defensehq@aol.com</p>

</body>
</html>
