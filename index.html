<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOD Cyber Command Contact</title>
  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    img {
      max-width: 200px;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 90%;
      max-width: 400px;
      margin-bottom: 10px;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px 20px;
      background-color: #444;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .email {
      margin-top: 20px;
      color: #bbb;
      font-style: italic;
    }
  </style>
</head>
<body>

  <img src="1024px-Seal_of_the_United_States_Department_of_Defense.svg.png" alt="Department of Defense Seal">

  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <input type="text" name="name" placeholder="Your Name" required><br>
    <input type="email" name="_replyto" placeholder="Your Email" required><br>
    <textarea name="message" placeholder="Your Message" rows="5" required></textarea><br>
    <button type="submit">Send Message</button>
  </form>

  <p class="email">Official Contact: dept.defensehq@aol.com</p>

</body>
</html>
